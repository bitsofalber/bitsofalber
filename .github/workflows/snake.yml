# Genera la animación "contribution snake" y la publica en la rama 'output'.
# El README apunta a raw .../output/github-snake-dark.svg.
name: generate-snake

on:
  schedule:
    - cron: "0 3 * * *"   # cada día
  workflow_dispatch:       # y manual
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake svg
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=2DD4BF

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
